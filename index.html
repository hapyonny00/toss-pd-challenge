<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>회의 조율 — 토스 PD 챌린지 2026 · 김화연</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root {
    --accent: #1F88FF; --blue50: #EAF1FF;
    --base: #F4F4F6; --s1: #FFFFFF; --s2: #ECECEE;
    --tp: #17171A; --ts: #616166; --tm: #8E8E93; --hair: #ECECEE;
  }
  [data-theme="dark"] {
    --accent: #3D92FF; --blue50: #14263F;
    --base: #0D111B; --s1: #151C2B; --s2: #1C2436;
    --tp: #FFFFFF; --ts: #B8B8BE; --tm: #8E8E93; --hair: #232D42;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif; background: var(--base); color: var(--tp); overflow: hidden; transition: background .3s, color .3s; }
  .shell { display: flex; height: 100vh; }

  /* ══ One UI Navigation Rail ══ */
  .rail {
    width: 88px; flex: none; display: flex; flex-direction: column; align-items: center;
    padding: 16px 0 14px; gap: 4px; background: var(--base);
  }
  .rail .logo {
    width: 46px; height: 46px; border-radius: 16px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px;
    margin-bottom: 12px; letter-spacing: -.5px;
  }
  .rail .fab {
    width: 50px; height: 50px; border-radius: 25px; background: var(--accent); color: #fff; border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 10px;
    box-shadow: 0 6px 16px rgba(31,136,255,.32); transition: transform .14s cubic-bezier(.16,1,.3,1), border-radius .14s;
  }
  .rail .fab:hover { border-radius: 18px; }
  .rail .fab:active { transform: scale(.92); }
  .rail .fab .ic { width: 24px; height: 24px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; }
  .rail .item {
    width: 68px; padding: 9px 0 7px; border: none; background: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 5px; border-radius: 20px;
    color: var(--tm); transition: background .18s, color .18s;
  }
  .rail .item:hover { background: var(--s2); }
  .rail .item.on { background: var(--blue50); color: var(--accent); }
  .rail .item .ic { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .rail .item .lb { font-size: 11px; font-weight: 600; letter-spacing: -.2px; }
  .rail .sp { flex: 1; }
  .rail .foot { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .rail .fbtn { width: 46px; height: 46px; border: none; background: var(--s1); color: var(--ts); border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .rail .fbtn:hover { background: var(--s2); }
  .rail .fbtn .ic { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .rail .avatar { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg,#7C6BF0,#1F88FF); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; }

  /* ══ content ══ */
  .content { flex: 1; min-width: 0; padding: 12px 12px 12px 0; }
  .viewcard { width: 100%; height: 100%; border-radius: 28px; overflow: hidden; background: var(--s1); position: relative; }
  iframe { width: 100%; height: 100%; border: none; display: block; background: var(--base); }
  .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--tm); font-size: 14px; font-weight: 600; pointer-events: none; opacity: 0; transition: opacity .2s; }
  .loading.show { opacity: 1; }

  @media (max-width: 720px) {
    .rail { width: 100%; height: 68px; flex-direction: row; padding: 0 10px; gap: 2px; position: fixed; bottom: 0; left: 0; z-index: 10; border-top: 1px solid var(--hair); }
    .rail .logo, .rail .foot { display: none; }
    .rail .sp { flex: 0; }
    .rail .item { flex: 1; width: auto; padding: 8px 0 6px; }
    .shell { flex-direction: column; }
    .content { padding: 0 0 68px; }
    .viewcard { border-radius: 0; }
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><defs>
  <symbol id="n-cal" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15.5" rx="4"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3"/></symbol>
  <symbol id="n-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="n-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></symbol>
  <symbol id="n-moon" viewBox="0 0 24 24"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></symbol>
  <symbol id="n-user-plus" viewBox="0 0 24 24"><circle cx="10" cy="8" r="3.5"/><path d="M4 20c0-3.5 2.7-6 6-6s6 2.5 6 6"/><path d="M18 8v4M16 10h4"/></symbol>
  <symbol id="n-chat" viewBox="0 0 24 24"><path d="M21 12a8.5 8.5 0 0 1-8.5 8.5c-1.5 0-3-.4-4.2-1.1L3.5 20.5l1.1-4.8A8.5 8.5 0 1 1 21 12z"/><path d="M8.5 11h7M8.5 14.2h4.5"/></symbol>
</defs></svg>

<div class="shell">
  <nav class="rail">
    <div class="logo">모임</div>
    <button class="fab" onclick="quickCreate()" aria-label="회의 잡기"><svg class="ic"><use href="#n-plus"/></svg></button>
    <button class="item on" data-src="oneui/app-calendar.html" onclick="nav(this)"><svg class="ic"><use href="#n-cal"/></svg><span class="lb">캘린더</span></button>
    <button class="item" data-src="moim-chat/index.html" onclick="nav(this)"><svg class="ic"><use href="#n-chat"/></svg><span class="lb">모임 챗</span></button>
    <button class="item" onclick="addTeammate()"><svg class="ic"><use href="#n-user-plus"/></svg><span class="lb">팀원 추가</span></button>
    <span class="sp"></span>
    <div class="foot">
      <button class="fbtn" id="themeBtn" onclick="toggleTheme()" aria-label="다크 모드"><svg class="ic"><use href="#n-moon" id="themeIcon"/></svg></button>
      <div class="avatar">지</div>
    </div>
  </nav>

  <div class="content">
    <div class="viewcard">
      <div class="loading" id="loading">불러오는 중…</div>
      <iframe id="view" title="프로토타입 뷰"></iframe>
    </div>
  </div>
</div>

<script>
let theme = new URLSearchParams(location.search).get("theme")==="dark" ? "dark" : "light";
let currentSrc = "oneui/app-calendar.html";
const view = document.getElementById("view");
const loading = document.getElementById("loading");

function withTheme(src){ return src + (src.includes("?")?"&":"?") + "theme=" + theme; }
function load(src){
  currentSrc = src; loading.classList.add("show");
  view.src = withTheme(src);
}
view.addEventListener("load", ()=>{ loading.classList.remove("show"); try{ view.contentWindow.postMessage({theme}, "*"); }catch(e){} });

function quickCreate(){
  try{ view.contentWindow.postMessage({openCreate:true}, "*"); }catch(e){}
}
function addTeammate(){
  try{ view.contentWindow.postMessage({openPicker:true}, "*"); }catch(e){}
}
function nav(btn){
  document.querySelectorAll(".rail .item").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  load(btn.dataset.src);
}
function applyTheme(){
  document.body.setAttribute("data-theme", theme);
  document.getElementById("themeIcon").setAttribute("href", theme==="dark" ? "#n-sun" : "#n-moon");
}
function toggleTheme(){
  theme = theme==="dark" ? "light" : "dark";
  applyTheme();
  // 즉시 반영 시도(app-calendar은 message 수신) + 안전하게 재로드
  try{ view.contentWindow.postMessage({theme}, "*"); }catch(e){}
  view.src = withTheme(currentSrc);
}

applyTheme();
load("oneui/app-calendar.html");
</script>
</body>
</html>
